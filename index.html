<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post Idea Generator</title>
  <style>
    body {
      font-family: Arial;
      padding: 40px;
      max-width: 600px;
      margin: auto;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    #output {
      margin-top: 20px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>Post Idea Generator</h1>
<p>Generate simple content ideas for your business</p>

<input id="niche" placeholder="e.g. cafe, real estate, fitness coach">

<select id="style">
  <option>Educational</option>
  <option>Behind the scenes</option>
  <option>Promotional</option>
  <option>Fun / relatable</option>
  <option>Mix of everything</option>
</select>

<button onclick="generateIdeas()">Generate Ideas</button>

<div id="output"></div>

<script>
async function generateIdeas() {
  const niche = document.getElementById("niche").value;
  const style = document.getElementById("style").value;

  const prompt = `Generate 10 simple social media post ideas for a ${niche} business. Style: ${style}. Include a title, angle, hook, and format.`;

  document.getElementById("output").innerText = "Generating...";

  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer YOUR_API_KEY"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [{ role: "user", content: prompt }]
    })
  });

  const data = await response.json();
  document.getElementById("output").innerText = data.choices[0].message.content;
}
</script>

</body>
</html>
